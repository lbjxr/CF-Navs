name = "cf-navs"
main = "worker/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

# 编译后的 Svelte 静态资源；SPA 模式，未命中的路径回退到 index.html
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
# 管理员初始化用户名；修改后下次登录会同步更新 D1
INIT_ADMIN_USER = "admin"
# 初始密码请用 secret，不要写明文：
#   wrangler secret put INIT_ADMIN_PASSWORD
# 旧数据库首次升级或强制重置时设置一个新的唯一标记：
#   RESET_ADMIN_CREDENTIALS = "reset-2026-07-12"
# Token 有效期（秒），默认 7 天
SESSION_TTL = "604800"

[[d1_databases]]
binding = "DB"
database_name = "cf-navs-db"
database_id = "replace-with-your-d1-database-id"

[[kv_namespaces]]
binding = "SESSION"
id = "replace-with-your-kv-namespace-id"
